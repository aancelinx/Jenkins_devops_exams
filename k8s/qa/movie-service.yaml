apiVersion: apps/v1
kind: Deployment
metadata:
  name: movie-service
  namespace: qa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: movie-service
  template:
    metadata:
      labels:
        app: movie-service
    spec:
      containers:
      - name: movie-service
        image: ancela/movie-service:latest
        ports:
        - containerPort: 5000
        env:
        - name: SERVICE_NAME
          value: "movie-service"
---
apiVersion: v1
kind: Service
metadata:
  name: movie-service
  namespace: qa
spec:
  selector:
    app: movie-service
  ports:
    - port: 80
      targetPort: 5000
  type: ClusterIP
